version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: miyoushe-mysql
    restart: unless-stopped
    ports:
      # README 中会直接给出基于 127.0.0.1:3306 的迁移命令，因此必须显式暴露宿主机端口。
      # 否则“先起 mysql 容器，再在宿主机执行迁移脚本”的流程会天然连不上库。
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_DATABASE=${MYSQL_DATABASE:-miyoushe}
      - MYSQL_USER=${MYSQL_USER:-miyoushe}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-change_me_mysql_password}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-change_me_mysql_root_password}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: miyoushe-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # 容器本地时区同时影响 Python logging 与 Uvicorn 访问日志的显示时间。
      # 这里显式固定为东八区，避免 docker logs 与前端展示/运维认知相差 8 小时。
      - TZ=Asia/Shanghai
      # JWT 签名密钥（生产环境必须修改为强随机值）
      - SECRET_KEY=${SECRET_KEY:-change_me_to_a_strong_random_string}
      # Cookie 加密密钥（生产环境必须修改）
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change_me_to_another_strong_random_string}
      # 生产默认改为 MySQL 8；如需覆盖，请在 .env 中显式设置 DATABASE_URL。
      - DATABASE_URL=${DATABASE_URL:-mysql+asyncmy://${MYSQL_USER:-miyoushe}:${MYSQL_PASSWORD:-change_me_mysql_password}@mysql:3306/${MYSQL_DATABASE:-miyoushe}?charset=utf8mb4}
      # SMTP 邮件配置（按需填写）
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: miyoushe-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
